<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Foreign — a galley under sail">
  <rect width="128" height="128" fill="#e6dcc4"/>
  <!-- mast -->
  <line x1="64" y1="20" x2="64" y2="80" stroke="#2c1810" stroke-width="3"/>
  <!-- pennant -->
  <path d="M64 20 L78 24 L64 29 Z" fill="#c89b3c"/>
  <!-- sail -->
  <path d="M64 30 L94 64 L64 64 Z" fill="#c89b3c" stroke="#2c1810" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M64 30 L34 64 L64 64 Z" fill="#e6dcc4" stroke="#2c1810" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- hull -->
  <path d="M22 74 L106 74 Q98 92 64 92 Q30 92 22 74 Z" fill="#2c1810"/>
  <!-- prow tip -->
  <path d="M106 74 L114 66 L108 78 Z" fill="#2c1810"/>
  <!-- waves -->
  <g fill="none" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round">
    <path d="M20 98 q9 7 18 0 q9 -7 18 0 q9 7 18 0 q9 -7 18 0"/>
  </g>
  <!-- frame -->
  <g fill="none" stroke="#c89b3c">
    <rect x="6" y="6" width="116" height="116" stroke-width="1.5"/>
    <rect x="13" y="13" width="102" height="102" stroke-width="0.6"/>
  </g>
</svg>
