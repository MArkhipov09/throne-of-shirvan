<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Official — sealed decree">
  <rect width="128" height="128" fill="#e6dcc4"/>
  <!-- parchment decree -->
  <rect x="36" y="26" width="56" height="64" rx="3" fill="#f3ebd9" stroke="#2c1810" stroke-width="4"/>
  <!-- text lines -->
  <g stroke="#2c1810" stroke-width="2.6" stroke-linecap="round">
    <line x1="47" y1="40" x2="81" y2="40"/>
    <line x1="47" y1="50" x2="81" y2="50"/>
    <line x1="47" y1="60" x2="73" y2="60"/>
  </g>
  <!-- ribbon tails -->
  <path d="M58 86 L54 104 L62 99 Z" fill="#2c1810"/>
  <path d="M70 86 L74 104 L66 99 Z" fill="#2c1810"/>
  <!-- wax seal pressed at the foot -->
  <circle cx="64" cy="92" r="13" fill="#c89b3c" stroke="#2c1810" stroke-width="3"/>
  <circle cx="64" cy="92" r="6" fill="none" stroke="#2c1810" stroke-width="2.4"/>
  <!-- frame -->
  <g fill="none" stroke="#c89b3c">
    <rect x="6" y="6" width="116" height="116" stroke-width="1.5"/>
    <rect x="13" y="13" width="102" height="102" stroke-width="0.6"/>
  </g>
</svg>
