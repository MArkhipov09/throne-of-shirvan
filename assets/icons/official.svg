<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Official — wax seal">
  <rect width="128" height="128" fill="#e6dcc4"/>

  <!-- Two ribbons hanging from the seal -->
  <path d="M 50 60 L 36 110 L 46 108 L 58 64 Z" fill="#2c1810"/>
  <path d="M 78 60 L 92 110 L 82 108 L 70 64 Z" fill="#2c1810"/>
  <!-- Ribbon notches -->
  <path d="M 36 110 L 41 104 L 46 108 Z" fill="#e6dcc4"/>
  <path d="M 92 110 L 87 104 L 82 108 Z" fill="#e6dcc4"/>

  <!-- Seal disc -->
  <circle cx="64" cy="54" r="28" fill="#2c1810"/>
  <!-- Inner ring (cut from disc) -->
  <circle cx="64" cy="54" r="22" fill="none" stroke="#e6dcc4" stroke-width="1.2"/>

  <!-- Star / Persian arabesque inside (8-pointed star, negative space) -->
  <g fill="#e6dcc4">
    <path d="M 64 36 L 68 50 L 64 54 L 60 50 Z"/>
    <path d="M 82 54 L 68 58 L 64 54 L 68 50 Z"/>
    <path d="M 64 72 L 60 58 L 64 54 L 68 58 Z"/>
    <path d="M 46 54 L 60 50 L 64 54 L 60 58 Z"/>
    <path d="M 76 42 L 70 52 L 64 54 L 66 48 Z"/>
    <path d="M 76 66 L 66 60 L 64 54 L 70 56 Z"/>
    <path d="M 52 66 L 58 56 L 64 54 L 62 60 Z"/>
    <path d="M 52 42 L 62 48 L 64 54 L 58 52 Z"/>
  </g>

  <!-- Small center dot -->
  <circle cx="64" cy="54" r="2.5" fill="#2c1810"/>

  <!-- Frame -->
  <g fill="none" stroke="#c89b3c">
    <rect x="4" y="4" width="120" height="120" stroke-width="1"/>
    <rect x="9" y="9" width="110" height="110" stroke-width="0.4"/>
  </g>
</svg>
