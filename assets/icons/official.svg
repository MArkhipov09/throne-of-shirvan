<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Official — sealed decree">
  <rect width="128" height="128" fill="#e6dcc4"/>
  <!-- parchment decree -->
  <rect x="38" y="30" width="52" height="60" rx="3" fill="#f3ebd9" stroke="#2c1810" stroke-width="4"/>
  <!-- text lines -->
  <g stroke="#2c1810" stroke-width="2.4" stroke-linecap="round">
    <line x1="48" y1="44" x2="80" y2="44"/>
    <line x1="48" y1="54" x2="80" y2="54"/>
    <line x1="48" y1="64" x2="72" y2="64"/>
  </g>
  <!-- wax seal hanging from the foot -->
  <line x1="64" y1="90" x2="64" y2="98" stroke="#2c1810" stroke-width="3"/>
  <circle cx="64" cy="104" r="11" fill="#c89b3c" stroke="#2c1810" stroke-width="3"/>
  <circle cx="64" cy="104" r="4" fill="none" stroke="#2c1810" stroke-width="2"/>
  <!-- frame -->
  <g fill="none" stroke="#c89b3c">
    <rect x="6" y="6" width="116" height="116" stroke-width="1.5"/>
    <rect x="13" y="13" width="102" height="102" stroke-width="0.6"/>
  </g>
</svg>
