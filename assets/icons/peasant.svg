<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Peasant — sheaf of wheat">
  <rect width="128" height="128" fill="#e6dcc4"/>
  <!-- stalks -->
  <g stroke="#2c1810" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="64" y1="104" x2="64" y2="38"/>
    <line x1="64" y1="104" x2="46" y2="48"/>
    <line x1="64" y1="104" x2="82" y2="48"/>
    <line x1="64" y1="104" x2="38" y2="60"/>
    <line x1="64" y1="104" x2="90" y2="60"/>
  </g>
  <!-- grain heads -->
  <g fill="#c89b3c" stroke="#2c1810" stroke-width="1.6">
    <ellipse cx="64" cy="34" rx="5" ry="10"/>
    <ellipse cx="45" cy="44" rx="4.5" ry="9" transform="rotate(-20 45 44)"/>
    <ellipse cx="83" cy="44" rx="4.5" ry="9" transform="rotate(20 83 44)"/>
    <ellipse cx="37" cy="56" rx="4" ry="8" transform="rotate(-34 37 56)"/>
    <ellipse cx="91" cy="56" rx="4" ry="8" transform="rotate(34 91 56)"/>
  </g>
  <!-- binding -->
  <rect x="53" y="88" width="22" height="9" rx="1.5" fill="#2c1810"/>
  <!-- frame -->
  <g fill="none" stroke="#c89b3c">
    <rect x="6" y="6" width="116" height="116" stroke-width="1.5"/>
    <rect x="13" y="13" width="102" height="102" stroke-width="0.6"/>
  </g>
</svg>
