<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Soldier — helmet">
  <rect width="128" height="128" fill="#e6dcc4"/>

  <!-- Helmet body (pointed kulah-khud) -->
  <path d="M 36 78 Q 36 50 64 24 Q 92 50 92 78 L 92 84 L 36 84 Z" fill="#2c1810"/>
  <!-- Helmet rim (deeper) -->
  <rect x="34" y="80" width="60" height="6" fill="#2c1810"/>
  <!-- Spike on top -->
  <path d="M 60 24 L 64 8 L 68 24 Z" fill="#2c1810"/>

  <!-- Nasal guard -->
  <rect x="61" y="84" width="6" height="14" fill="#2c1810"/>

  <!-- Cheek guards / aventail flaps -->
  <path d="M 34 84 Q 30 96 36 104 L 44 104 L 44 84 Z" fill="#2c1810"/>
  <path d="M 94 84 Q 98 96 92 104 L 84 104 L 84 84 Z" fill="#2c1810"/>

  <!-- Vertical ridge (lighter line carved into helmet) -->
  <line x1="64" y1="24" x2="64" y2="80" stroke="#e6dcc4" stroke-width="0.8"/>

  <!-- Rim suggestion -->
  <line x1="34" y1="80" x2="94" y2="80" stroke="#e6dcc4" stroke-width="0.8"/>

  <!-- Frame -->
  <g fill="none" stroke="#c89b3c">
    <rect x="4" y="4" width="120" height="120" stroke-width="1"/>
    <rect x="9" y="9" width="110" height="110" stroke-width="0.4"/>
  </g>
</svg>
