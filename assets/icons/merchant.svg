<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Merchant — balance scales">
  <rect width="128" height="128" fill="#e6dcc4"/>
  <g fill="none" stroke="#2c1810" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- beam -->
    <line x1="26" y1="46" x2="102" y2="46"/>
    <!-- post -->
    <line x1="64" y1="46" x2="64" y2="94"/>
    <!-- hangers -->
    <line x1="32" y1="46" x2="32" y2="56" stroke-width="2.5"/>
    <line x1="96" y1="46" x2="96" y2="56" stroke-width="2.5"/>
    <!-- pans -->
    <path d="M18 56 a14 11 0 0 0 28 0 Z"/>
    <path d="M82 56 a14 11 0 0 0 28 0 Z"/>
  </g>
  <!-- base -->
  <path d="M48 94 H80 L86 102 H42 Z" fill="#2c1810"/>
  <!-- finial -->
  <circle cx="64" cy="42" r="6" fill="#c89b3c" stroke="#2c1810" stroke-width="2.5"/>
  <!-- frame -->
  <g fill="none" stroke="#c89b3c">
    <rect x="6" y="6" width="116" height="116" stroke-width="1.5"/>
    <rect x="13" y="13" width="102" height="102" stroke-width="0.6"/>
  </g>
</svg>
