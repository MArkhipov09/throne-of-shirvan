<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Religious — mosque dome and crescent">
  <rect width="128" height="128" fill="#e6dcc4"/>
  <!-- base -->
  <rect x="32" y="98" width="64" height="10" fill="#2c1810"/>
  <!-- drum -->
  <rect x="44" y="84" width="40" height="14" fill="#2c1810"/>
  <!-- onion dome -->
  <path d="M44 84 Q34 66 46 52 Q48 40 64 34 Q80 40 82 52 Q94 66 84 84 Z" fill="#2c1810"/>
  <!-- arched doorway (accent) -->
  <path d="M58 98 Q58 86 64 86 Q70 86 70 98 Z" fill="#c89b3c"/>
  <!-- finial + crescent -->
  <line x1="64" y1="34" x2="64" y2="24" stroke="#2c1810" stroke-width="3"/>
  <path d="M66 8 a9 9 0 1 0 5 16 a7 7 0 1 1 -5 -16 Z" fill="#c89b3c" stroke="#2c1810" stroke-width="1.5"/>
  <!-- frame -->
  <g fill="none" stroke="#c89b3c">
    <rect x="6" y="6" width="116" height="116" stroke-width="1.5"/>
    <rect x="13" y="13" width="102" height="102" stroke-width="0.6"/>
  </g>
</svg>
