<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Envoy Toghan">
  <rect width="256" height="256" fill="#e6dcc4"/>

  <!-- Coat: crimson outer, with caspian inner -->
  <path d="M 28 256 L 28 222 Q 52 192 128 188 Q 204 192 228 222 L 228 256 Z" fill="#7a2f2a"/>
  <path d="M 28 256 L 28 222 Q 52 192 128 188 Q 204 192 228 222 L 228 256 Z" fill="none" stroke="#2c1810" stroke-width="1.2"/>
  <!-- Crossover collar (caspian) -->
  <path d="M 102 192 L 128 222 L 158 196 L 168 256 L 88 256 Z" fill="#1e3a5f"/>
  <path d="M 102 192 L 128 222 L 158 196" fill="none" stroke="#2c1810" stroke-width="1"/>
  <!-- Saffron piping along collar -->
  <path d="M 102 192 L 128 222 L 158 196" fill="none" stroke="#c89b3c" stroke-width="2"/>

  <!-- Belt with saffron clasp -->
  <path d="M 60 238 L 196 238 L 196 246 L 60 246 Z" fill="#2c1810"/>
  <rect x="120" y="234" width="16" height="14" fill="#c89b3c" stroke="#2c1810" stroke-width="0.6"/>
  <circle cx="128" cy="241" r="2" fill="#2c1810"/>

  <!-- Neck -->
  <path d="M 116 168 L 116 196 L 140 196 L 140 168 Z" fill="#f3ebd9"/>
  <line x1="116" y1="172" x2="116" y2="194" stroke="#2c1810" stroke-width="1"/>
  <line x1="140" y1="172" x2="140" y2="194" stroke="#2c1810" stroke-width="1"/>

  <!-- Wispy thin beard (sparse, drooping) -->
  <path d="M 122 168 L 124 192 L 126 168 Z" fill="#2c1810"/>
  <path d="M 132 168 L 132 188 L 134 168 Z" fill="#2c1810"/>

  <!-- Face: rounder, broader -->
  <path d="M 90 100 Q 88 80 128 78 Q 168 80 166 100 L 166 152 Q 164 174 128 178 Q 92 174 90 152 Z" fill="#f3ebd9" stroke="#2c1810" stroke-width="1.4"/>

  <!-- High cheekbones suggested -->
  <path d="M 102 142 Q 110 148 116 144" fill="none" stroke="#2c1810" stroke-width="0.6"/>
  <path d="M 154 142 Q 146 148 140 144" fill="none" stroke="#2c1810" stroke-width="0.6"/>

  <!-- Eyebrow (narrower, straighter, lower) -->
  <path d="M 108 116 L 124 114" fill="none" stroke="#2c1810" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 132 114 L 148 116" fill="none" stroke="#2c1810" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Narrower, slanted eye -->
  <path d="M 108 130 Q 116 126 124 130 Q 116 132 108 130 Z" fill="#2c1810"/>
  <path d="M 132 130 Q 140 126 148 130 Q 140 132 132 130 Z" fill="#2c1810"/>

  <!-- Small nose -->
  <path d="M 128 132 Q 132 148 130 156 L 124 156" fill="none" stroke="#2c1810" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Drooping mustache (Genghis style) -->
  <path d="M 108 162 Q 116 168 128 166 Q 140 168 148 162" fill="#2c1810"/>
  <path d="M 108 162 Q 102 174 100 188" fill="#2c1810" stroke="#2c1810" stroke-width="1.5"/>
  <path d="M 148 162 Q 154 174 156 188" fill="#2c1810" stroke="#2c1810" stroke-width="1.5"/>

  <!-- Lip line -->
  <path d="M 120 170 Q 128 173 136 170" fill="none" stroke="#2c1810" stroke-width="0.8"/>

  <!-- Fur hat: tall conical with broad fur brim -->
  <!-- Fur brim (broad) -->
  <path d="M 64 102 Q 56 110 64 124 Q 96 132 128 132 Q 160 132 192 124 Q 200 110 192 102 Q 160 92 128 92 Q 96 92 64 102 Z" fill="#2c1810"/>
  <!-- Fur texture lines -->
  <g stroke="#e6dcc4" stroke-width="0.6" fill="none">
    <path d="M 70 108 L 74 116"/>
    <path d="M 80 106 L 84 118"/>
    <path d="M 92 104 L 94 122"/>
    <path d="M 104 102 L 106 124"/>
    <path d="M 116 102 L 118 126"/>
    <path d="M 128 102 L 128 128"/>
    <path d="M 140 102 L 138 126"/>
    <path d="M 152 102 L 150 124"/>
    <path d="M 164 104 L 162 122"/>
    <path d="M 176 106 L 172 118"/>
    <path d="M 186 108 L 182 116"/>
  </g>
  <!-- Conical crown (rises above brim) -->
  <path d="M 82 102 Q 90 60 128 30 Q 166 60 174 102 Z" fill="#1e3a5f" stroke="#2c1810" stroke-width="1.2"/>
  <!-- Crown decorative vertical lines -->
  <path d="M 128 30 L 128 100" stroke="#2c1810" stroke-width="0.6"/>
  <path d="M 108 50 L 116 102" stroke="#2c1810" stroke-width="0.5" fill="none"/>
  <path d="M 148 50 L 140 102" stroke="#2c1810" stroke-width="0.5" fill="none"/>
  <!-- Saffron top finial -->
  <circle cx="128" cy="30" r="4" fill="#c89b3c" stroke="#2c1810" stroke-width="0.7"/>
  <path d="M 128 22 L 128 30" stroke="#2c1810" stroke-width="0.8"/>

  <!-- Frame -->
  <g fill="none" stroke="#c89b3c">
    <rect x="6" y="6" width="244" height="244" stroke-width="1.5"/>
    <rect x="14" y="14" width="228" height="228" stroke-width="0.5"/>
  </g>
  <g fill="#c89b3c">
    <path d="M 22 18 l 4 4 l -4 4 l -4 -4 z"/>
    <path d="M 234 18 l 4 4 l -4 4 l -4 -4 z"/>
    <path d="M 22 234 l 4 4 l -4 4 l -4 -4 z"/>
    <path d="M 234 234 l 4 4 l -4 4 l -4 -4 z"/>
  </g>
</svg>
