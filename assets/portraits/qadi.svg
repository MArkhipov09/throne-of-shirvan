<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Qadi Mahmud">
  <rect width="256" height="256" fill="#e6dcc4"/>

  <!-- Robe: parchment with naphtha trim -->
  <path d="M 30 256 L 30 226 Q 54 192 128 188 Q 202 192 226 226 L 226 256 Z" fill="#f3ebd9"/>
  <path d="M 30 256 L 30 226 Q 54 192 128 188 Q 202 192 226 226 L 226 256 Z" fill="none" stroke="#2c1810" stroke-width="1.2"/>
  <!-- Inner robe (caspian, austere) -->
  <path d="M 102 192 L 128 222 L 154 192 L 154 256 L 102 256 Z" fill="#1e3a5f"/>

  <!-- Naphtha collar trim -->
  <path d="M 60 222 Q 90 200 128 200 Q 166 200 196 222" fill="none" stroke="#2c1810" stroke-width="2"/>

  <!-- Prayer beads (tasbih) draped across robe -->
  <path d="M 80 232 Q 128 252 176 232" fill="none" stroke="#2c1810" stroke-width="0.8"/>
  <g fill="#2c1810">
    <circle cx="86" cy="234" r="2.5"/>
    <circle cx="98" cy="240" r="2.5"/>
    <circle cx="112" cy="245" r="2.5"/>
    <circle cx="128" cy="248" r="2.8"/>
    <circle cx="144" cy="245" r="2.5"/>
    <circle cx="158" cy="240" r="2.5"/>
    <circle cx="170" cy="234" r="2.5"/>
  </g>

  <!-- Neck -->
  <path d="M 116 168 L 116 200 L 140 200 L 140 168 Z" fill="#f3ebd9"/>
  <line x1="116" y1="172" x2="116" y2="198" stroke="#2c1810" stroke-width="1"/>
  <line x1="140" y1="172" x2="140" y2="198" stroke="#2c1810" stroke-width="1"/>

  <!-- White-grey beard: longer, fuller (stone color with hatching) -->
  <path d="M 94 144 Q 90 200 128 218 Q 166 200 162 144 Q 156 184 144 192 Q 128 200 112 192 Q 100 184 94 144 Z" fill="#e6dcc4" stroke="#2c1810" stroke-width="1.2"/>
  <!-- A few clean strokes for the grey beard (no scribble) -->
  <g stroke="#2c1810" stroke-width="0.9" fill="none" stroke-linecap="round">
    <path d="M 116 168 Q 116 190 124 206"/>
    <path d="M 128 166 L 128 210"/>
    <path d="M 140 168 Q 140 190 132 206"/>
  </g>

  <!-- Face -->
  <path d="M 96 96 Q 94 76 128 74 Q 162 76 160 96 L 160 154 Q 158 174 128 178 Q 98 174 96 154 Z" fill="#f3ebd9" stroke="#2c1810" stroke-width="1.4"/>

  <!-- Ear (subtle) -->
  <path d="M 160 124 Q 168 126 168 134 Q 166 142 160 142" fill="none" stroke="#2c1810" stroke-width="1"/>

  <!-- Eyebrow (heavier, severe) -->
  <path d="M 108 110 Q 122 102 136 110" fill="none" stroke="#2c1810" stroke-width="3" stroke-linecap="round"/>

  <!-- Almond eye (narrower, sterner) -->
  <path d="M 112 124 Q 122 120 134 124 Q 122 127 112 124 Z" fill="#2c1810"/>

  <!-- Nose line -->
  <path d="M 128 126 Q 134 142 132 152 L 124 154" fill="none" stroke="#2c1810" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Mouth (firm, downturned) -->
  <path d="M 118 162 Q 128 158 138 162" fill="none" stroke="#2c1810" stroke-width="1.2"/>

  <!-- Turban: larger religious turban, parchment with tail -->
  <path d="M 64 100 Q 50 36 128 28 Q 206 36 192 100 Q 192 84 180 70 Q 156 56 128 56 Q 100 56 76 70 Q 64 84 64 100 Z" fill="#f3ebd9" stroke="#2c1810" stroke-width="1.2"/>
  <!-- Turban wraps (round, layered) -->
  <path d="M 70 78 Q 128 56 186 78" fill="none" stroke="#2c1810" stroke-width="0.7"/>
  <path d="M 66 90 Q 128 68 190 90" fill="none" stroke="#2c1810" stroke-width="0.7"/>
  <path d="M 64 100 Q 128 80 192 100" fill="none" stroke="#2c1810" stroke-width="0.7"/>
  <!-- Turban tail hanging on side -->
  <path d="M 188 96 Q 200 108 198 132 Q 196 156 184 168 L 178 164 Q 190 152 190 132 Q 188 112 182 100 Z" fill="#f3ebd9" stroke="#2c1810" stroke-width="1"/>
  <!-- Faint vertical fold in tail -->
  <path d="M 188 110 Q 190 134 184 156" fill="none" stroke="#2c1810" stroke-width="0.5"/>

  <!-- Frame -->
  <g fill="none" stroke="#c89b3c">
    <rect x="6" y="6" width="244" height="244" stroke-width="1.5"/>
    <rect x="14" y="14" width="228" height="228" stroke-width="0.5"/>
  </g>
  <g fill="#c89b3c">
    <path d="M 22 18 l 4 4 l -4 4 l -4 -4 z"/>
    <path d="M 234 18 l 4 4 l -4 4 l -4 -4 z"/>
    <path d="M 22 234 l 4 4 l -4 4 l -4 -4 z"/>
    <path d="M 234 234 l 4 4 l -4 4 l -4 -4 z"/>
  </g>
</svg>
