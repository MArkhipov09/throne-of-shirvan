<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Throne of Shirvan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Cormorant+SC:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <main id="app">
      <header class="hud">
        <h1>Throne of Shirvan</h1>
        <ul class="stats" id="stats"></ul>
        <p class="reign">Cards played: <span id="cards-played">0</span></p>
      </header>

      <section class="card" id="card">
        <p class="speaker" id="speaker"></p>
        <p class="scenario" id="scenario"></p>
        <p class="explanation" id="explanation" hidden></p>
        <div class="options" id="options"></div>
      </section>
    </main>

    <script type="module" src="src/game.js" defer></script>
  </body>
</html>
